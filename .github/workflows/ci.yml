name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go — vet, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: go test
        working-directory: backend
        run: go test ./... -count=1

      - name: go build
        working-directory: backend
        run: go build ./cmd/api

  python:
    name: Python — uv sync + pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Pyright type-check pricer
        run: uv run pyright pricer/main.py

      # No pytest yet — tests don't exist

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Vite build
        run: npm run build

      - name: Run Vitest
        run: npm test
