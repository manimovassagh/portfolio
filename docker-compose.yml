services:
  pricer:
    build:
      context: .
      dockerfile: Dockerfile.pricer
    ports:
      - "8001:8001"
    volumes:
      - ./cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8766:8766"
    environment:
      - GIN_MODE=release
      - PRICER_URL=http://pricer:8001
      - EXPORTS_DIR=/data/exports
      - DB_PATH=/data/kapital.db
      - TLS_CERT=/app/certs/cert.pem
      - TLS_KEY=/app/certs/key.pem
    volumes:
      - ./exports:/data/exports
      - kapital-db:/data
      - ./certs:/app/certs
    depends_on:
      pricer:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost:8766/api/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kapital-db:
