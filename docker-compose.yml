services:
  pricer:
    build:
      context: .
      dockerfile: Dockerfile.pricer
    ports:
      - "8001:8001"
    volumes:
      - ./cache:/app/cache
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8766:8766"
    environment:
      - PRICER_URL=http://pricer:8001
      - EXPORTS_DIR=/data/exports
      - DB_PATH=/data/kapital.db
    volumes:
      - ./exports:/data/exports
      - kapital-db:/data
      - ./certs:/app/certs
    depends_on:
      - pricer
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  kapital-db:
