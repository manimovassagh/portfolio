services:
  pricer:
    build:
      context: .
      dockerfile: pricer/Dockerfile
    restart: unless-stopped
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./exports:/app/exports      # drop your CSV exports here
      - kapital-db:/app/db          # persists watchlist SQLite across restarts
    environment:
      WATCHLIST_DB: db/portfolio.db
      PRICER_URL: http://pricer:8001
    expose:
      - "8766"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8766/api/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      pricer:
        condition: service_healthy

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"                     # HTTP → redirects to HTTPS
      - "443:443"                   # HTTPS
    volumes:
      - ./certs:/etc/nginx/ssl:ro   # mkcert trusted certs (run setup-certs.sh first)
    environment:
      AUTH_USER: ""                 # set to enable HTTP Basic Auth (e.g. "admin")
      AUTH_PASS: ""                 # password for AUTH_USER
    depends_on:
      backend:
        condition: service_healthy

volumes:
  kapital-db:
